name: Generate Datas

on:
  # 1) 24시간마다 한 번씩 자동으로 실행 (매일 밤 자정쯤)
  schedule:
    - cron: "0 0 * * *"
  
  # 2) 수동으로도 원할 때 언제든 실행할 수 있게 설정
  workflow_dispatch:
  
  # 3) 메인 브랜치에 코드가 push될 때마다 실행
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 깃허브 잔디를 먹는 뱀 애니메이션 생성 오픈소스 매칭
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # 빌드된 뱀 파일을 output 브랜치에 안전하게 저장
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
